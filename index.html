    try{const r=await fetch('/load-'+name);if(r.ok)return await r.json()}

async function injectInstructions(arr){
  try{
    const r=await fetch('/load-instructions');
    if(!r.ok)return null;
    const data=await r.json();
    const list=data.list||[];
    const enabled=list.filter(x=>x.enabled!==false);
    if(enabled.length===0)return null;
    const text=enabled.map(x=>'【'+x.name+'】\n'+x.content).join('\n\n');
    const msg={role:'system',content:'=== 自定义指令 ===\n'+text};
    arr.push(msg);
    return msg;
  }catch(e){return null;}
}

function scheduleProactive(){
  clearTimeout(proactiveTimer);
  if(petCfg.proactiveGreeting===false){proactiveTimer=setTimeout(scheduleProactive,60000);return;}
  const min=(petCfg.intervalMin||3)*1000*60;
  const max=(petCfg.intervalMax||5)*1000*60;
  const delay=min+Math.random()*(max-min);
  proactiveTimer=setTimeout(()=>{if(aiCfg.apiKey)autoGreet();else noAiGreet()},delay);
}
async function autoGreet(){
  _chatAborted=false;
  if(!chatCfg.msgs||aiBusy){scheduleProactive();return;}
  if(!pinned){window.api?.togglePin();pinned=true}
  if(!(await window.api?.aiStart('greet'))){scheduleProactive();return;}
  let ac=new AbortController(),t;
  const abortAi=()=>{if(ac)ac.abort();clearTimeout(t);fetch('/bash-abort',{method:'POST'}).catch(()=>{});};
  const unsub=window.api?.onAiAbort(abortAi);
  _abortChatFn=abortAi;
  aiBusy=true;
  const now=Date.now();
  if(now-lastChatTime<60000){aiBusy=false;scheduleProactive();return;}
  try{
    const ctx=await buildAiContext('greet');
    const r=await runChatFullLoop(ctx.msgs,ctx.tools,{systemRoleMsg:ctx.systemRoleMsg,experiencesMsg:ctx.experiencesMsg,instructionsMsg:ctx.instructionsMsg,instructionMsgs:ctx.instructionMsgs}, ac.signal);
    if(!r.finalReply){scheduleProactive();return;}
    tryGenerateWorkMemory(r.sessionMsgs, r.finalReply); // 异步生成工作记忆
    // 用户点击中断后丢弃回复，不保存不显示
    if(_chatAborted){scheduleProactive();return;}
    const rawReply=r.finalReply;
    const bubbleText=cleanForDisplay(rawReply);
    if(!bubbleText){scheduleProactive();return;}
    chatCfg.msgs.push({role:'assistant',content:bubbleText,time:getTime()});
    await saveChatCfg();
    bubble(bubbleText,false,rawReply);
    scheduleProactive();
  }catch(e){
    if(e.name==='AbortError'){scheduleProactive();}
    else{noAiGreet();scheduleProactive();}
  }finally{
    _abortChatFn=null;aiBusy=false;unsub?.();window.api?.aiDone();
  }
}
function noAiGreet(){
  if(!pinned){window.api?.togglePin();pinned=true}
  const secs=lastChatTime>0?Math.floor((Date.now()-lastChatTime)/1000):Math.floor(Math.random()*600)+30;
  if(secs<300){scheduleProactive();return;}
  const g=getGreetingPool(secs);
  const msg=pickRandom(g.pool);
  const emo=pickRandom(g.emotions);
  bubble(msg,false,'[情绪:'+emo+']',true);
  scheduleProactive();
}

let clickLock=false;
let priorityBubble=false;
let bubbleSeq=0; // 每次产生气泡自增；只用"最新一次"点击/调用的结果，避免旧请求覆盖或误关新气泡
let _hoverArmed=true; // 气泡刚出现时短暂屏蔽悬停检测，避免"气泡恰好出现在鼠标下"被永久判定为悬停而导致不消失
getEl('drag').addEventListener('click',e=>{

  clickLock=true;setTimeout(()=>clickLock=false,250);
  const x=e.offsetX,y=e.offsetY;
  let hit=null;
  for(const z of bodyZones){
    if(x>=z.x1&&x<=z.x2&&y>=z.y1&&y<=z.y2){if(!hit||z.priority>hit.priority)hit=z;}
  }
  if(hit&&clickReactions[hit.name]){
    const react=clickReactions[hit.name][0];
    const emo=react.emotions[Math.floor(Math.random()*react.emotions.length)];

// 参数控制（使用 index 缓存避免重复线性查找）
let _paramCache={};
function getPIdx(id){
  if(_paramCache[id]!==undefined)return _paramCache[id];
  const cm=model?.internalModel?.coreModel;if(!cm)return -1;
  const idx=cm._parameterIds.indexOf(id);
  _paramCache[id]=idx;

}
function setP(id,v){

    if(cm)cm._parameterValues[idx]=v;
  }catch(e){}
}


const BUBBLE_DURATION=15000;
let bubbleTimerStart=0;
function startBubbleTimer(remain){
  clearTimeout(bubbleTimer);
  const delay=remain||BUBBLE_DURATION;
  bubbleTimerStart=Date.now();
  bubbleTimer=setTimeout(()=>{
    if(voiceActive){
      // 语音还在播放，等播完再隐藏气泡（onended 触发后隐藏，不强行掐断长语音）
      voiceEndCb=()=>{if(!bubbleHover){const e=getEl('b');if(e)e.style.display='none';priorityBubble=false}voiceEndCb=null};
      return;
    }
    const e=getEl('b');if(e)e.style.display='none';
    priorityBubble=false;
  },delay);
}

function showBubble(t,expRaw,dur,skipChat,seq){
  // 重置悬停状态，并延迟武装悬停检测：防止上次悬停残留，或气泡恰好出现在鼠标下方时
  // mouseenter 立即触发导致 bubbleHover 永久为 true、计时器被跳过而气泡永不消失
  bubbleHover=false;
  _hoverArmed=false;
  setTimeout(()=>{_hoverArmed=true;},350);
  if(_isDragging)return; // 拖拽中不显示气泡
  // 只显示最新一次点击/调用产生的气泡，避免旧请求（如更早的 TTS）覆盖或顶掉新气泡
  if(seq!==undefined&&seq!==bubbleSeq)return;
  // 清除旧语音的关闭回调，防止错误隐藏新气泡
  voiceEndCb=null;
  const b=getEl('b');
  b.textContent=t;
  b.scrollTop=0; // 新气泡从顶部开始，避免沿用上一次朗读遗留的底部滚动位置
  b.style.display='block';
  b.style.animation='none';
  void b.offsetWidth;
  b.style.top='auto';
  b.style.bottom='350px';
  b.style.left=Math.max(10,Math.round((280-b.offsetWidth)/2))+'px';
  b.style.animation='bubbleIn .25s ease';
  if(!bubbleHover)startBubbleTimer(dur);
  // 通知聊天窗口：气泡已出现（点击反馈不通知）
  if(!skipChat)window.api?.sendToChatWindow({type:'show-reply',text:cleanForDisplay(expRaw||t)});
  // 动作与气泡同步出现，不等待气泡动画结束
  if(expRaw)applyEmotionAction(expRaw);
}
function bubble(t, skipSpeak, expRaw, priority, dur, skipChat){
  const seq=++bubbleSeq;
  if(priority)priorityBubble=true;
  if(voiceEnabled&&!skipSpeak){
    // 语音就绪时同步显示气泡，不再固定等待
    speak(t,()=>showBubble(t,expRaw,dur,skipChat,seq),seq);
  }else{
    showBubble(t,expRaw,dur,skipChat,seq);
    if(!skipSpeak)speak(t,null,seq);
  }
}
// 鼠标悬停暂停计时，离开后续上剩余时间
getEl('b').addEventListener('mouseenter',()=>{
  if(!_hoverArmed)return; // 气泡刚出现时忽略，避免误判为悬停
  bubbleHover=true;
  clearTimeout(bubbleTimer);
  bubbleTimer=null;
});
getEl('b').addEventListener('mouseleave',()=>{
  bubbleHover=false;
  const elapsed=Date.now()-bubbleTimerStart;
  const remain=Math.max(1000,BUBBLE_DURATION-elapsed);
  startBubbleTimer(remain);
});

async function speak(text, onReady, seq){
  // 已被更新的点击/调用取代：放弃本次语音与气泡，避免旧请求顶掉新气泡
  if(seq!==undefined&&seq!==bubbleSeq){return;}
  if(!voiceEnabled||!text){onReady?.();return;}
  const clean=cleanForTTS(text);
  if(!clean){onReady?.();return;}
  let readyCalled=false;
  const callReadyOnce=()=>{if(!readyCalled){readyCalled=true;if(seq===undefined||seq===bubbleSeq)onReady?.();}};
  try{
    const ctl=new AbortController();
    const res=await fetch('/tts',{method:'POST',headers:{'Content-Type':'text/plain'},body:clean,signal:ctl.signal});
    if(seq!==undefined&&seq!==bubbleSeq)return; // 等待期间已有新点击，放弃
    if(!res.ok){callReadyOnce();return;}
    const buf=await res.arrayBuffer();
    if(seq!==undefined&&seq!==bubbleSeq)return;
    if(!buf||buf.byteLength<100){callReadyOnce();return;}
    if(audioSrc){try{audioSrc.stop()}catch(e){}}
    let ctx=audioCtx;
    if(!ctx||ctx.state==='closed'){closeAudioCtx();ctx=new (window.AudioContext||window.webkitAudioContext)();audioCtx=ctx;}
    if(ctx.state==='suspended')await ctx.resume();
    let b;
    try{b=await ctx.decodeAudioData(buf.slice(0))}
    catch(de){console.warn('decodeAudioData失败:',de.message);callReadyOnce();return}
    if(seq!==undefined&&seq!==bubbleSeq)return; // 解码完成已过时，放弃播放，避免播旧语音/旧气泡
    const slen=Math.round(b.sampleRate*0.5);
    const nb=ctx.createBuffer(b.numberOfChannels,b.length+slen,b.sampleRate);
    for(let ch=0;ch<b.numberOfChannels;ch++){const o=b.getChannelData(ch),n=nb.getChannelData(ch);n.set(o,slen)}
    const src=ctx.createBufferSource();
    audioSrc=src;
    src.buffer=nb;
    src.connect(ctx.destination);
    voiceActive=true;
    const myMSeq=++mouthSeq;
    clearInterval(mouthTimer);
    mouthTimer=setInterval(()=>{
      const cm=model?.internalModel?.coreModel;
      if(!cm)return;
      const idx=cm._parameterIds.indexOf('ParamMouthOpenY');
      if(idx<0)return;
      cm._parameterValues[idx]=cm._parameterValues[idx]>0.1?0:0.5;
    },250);
    src.onended=()=>{
      voiceActive=false;
      voiceAnimLock=false;
      if(myMSeq===mouthSeq){clearInterval(mouthTimer);setP('ParamMouthOpenY',0);}
      // 复位所有表情和手势临时参数
      expAll.forEach(p=>setP(p,0));
      gestAll.forEach(p=>setP(p,0));
      // 语音结束，复位动作参数
      setP('ParamAngleX',0);setP('ParamAngleY',0);setP('ParamAngleZ',0);
      setP('ParamMouthOpenY',0);setP('ParamMouthForm',0);
      setP('ParamEyeLOpen',1);setP('ParamEyeROpen',1);
      setP('WZY',0);
      // 恢复用户手动选中的表情和手势
      if(state.expr&&expParams[state.expr])expParams[state.expr].forEach(([p,val])=>setP(p,val));
      Object.values(state.gest).forEach(g=>{if(gestParams[g])gestParams[g].forEach(([p,val])=>setP(p,val))});
      // 仅当本段语音仍是最新一次时才自动隐藏气泡，否则会误关新点击产生的气泡
      if(seq===undefined||seq===bubbleSeq){
        clearTimeout(bubbleTimer);
        if(!bubbleHover){const b=getEl('b');if(b)b.style.display='none';priorityBubble=false;}
        if(voiceEndCb)voiceEndCb();
      }
    };
    voiceAnimLock=true;
    callReadyOnce();
    src.start(0);
    // 气泡滚动跟随语音进度：按播放时间比例把气泡自动滚到正在朗读的位置
    // （中文 TTS 大致匀速，时间比例≈文字进度，长文本时滚动条自动向下移动）
    const bubbleEl=getEl('b');
    const totalDur=nb.duration||0;
    if(bubbleEl&&totalDur>0){
      const t0=ctx.currentTime;
      const syncBubbleScroll=()=>{
        if(!voiceActive)return; // 语音结束即停止
        if(seq!==undefined&&seq!==bubbleSeq)return; // 已有更新的气泡在播，停止本次跟随
        const p=Math.min(1,(ctx.currentTime-t0)/totalDur); // 严格跟随语音进度，读到哪滚到哪（不提前到底，避免早早停住显得"滚太快"）
        const max=bubbleEl.scrollHeight-bubbleEl.clientHeight;
        if(max>4)bubbleEl.scrollTop=p*max; // 仅在确有滚动空间时滚动
        requestAnimationFrame(syncBubbleScroll);
      };
      requestAnimationFrame(syncBubbleScroll);
    }
  }catch(e){callReadyOnce();console.warn('TTS异常:',e.message)}
}


window.api?.onMenu((a,v)=>{
  clearTimeout(idleTimer);
  idleTimer=null;
  if(model&&model.internalModel&&model.internalModel.focusController){
    const fc=model.internalModel.focusController;
    fc.targetX=0;fc.targetY=0;
  }
  switch(a){
    case 'expr':
      state.expr=(state.expr===v?null:v);
      // 只清表情参数，不清手势和装饰
      expAll.forEach(p=>setP(p,0));
      if(state.expr&&expParams[state.expr])expParams[state.expr].forEach(([p,val])=>setP(p,val));
      break;
    case 'gesture':
      const grp=gestGroup[v];
      state.gest[grp]=(state.gest[grp]===v?undefined:v);
      // 只清手势参数，不清表情和装饰
      gestAll.forEach(p=>setP(p,0));
      Object.values(state.gest).forEach(g=>{if(gestParams[g])gestParams[g].forEach(([p,val])=>setP(p,val))});
      break;
    case 'deco':
      if(state.deco[v]){delete state.deco[v];setP(decoP[v],0)}
      else{state.deco[v]=true;setP(decoP[v],1)}
      saveDeco();
      break;
    case 'skills':
      window.api?.openSkillsWindow();
      break;
    case 'tools':
      window.api?.openToolsWindow();
      break;
    case 'pet-cfg':
      window.api?.openPetCfgWindow();
      break;
    case 'instructions':
      window.api?.openInstructionsWindow();
      break;
    case 'chat':
      if(!aiCfg.apiKey){window.api?.openAiCfgWindow();bubble('请先配置AI模型');return}
      window.api?.openChatWindow();
      break;
    case 'config':
      window.api?.openAiCfgWindow();
      break;
    case 'pin':
      pinned=!pinned;
      window.api?.togglePin();
      break;
    case 'workspace-window':
      window.api?.openWorkspaceWindow();
      break;
    case 'voice':
      voiceEnabled=v==='on';
      saveVoice();
      break;
    case 'reset':
      state={expr:null,gest:{},deco:{}};
      expAll.forEach(p=>setP(p,0));
      gestAll.forEach(p=>setP(p,0));
      Object.values(decoP).forEach(p=>setP(p,0));
      setP('YFNPZ',1);
      model.scale.set(0.04);
      if(model.internalModel&&model.internalModel.focusController){
        const fc=model.internalModel.focusController;
        fc.targetX=0;fc.targetY=0;fc.x=0;fc.y=0;
      }
      try{model.motion('idle',0,3)}catch(e){}
      // 清空 .deco.json
      store.save('deco',{})
      bubble('已重置 ✅',false,undefined,false,undefined,true);
      break;
    case 'action':
      doAction(v);
      break;
  }
});



// 气泡和聊天窗口显示过滤（保留 emoji）
function cleanForDisplay(text){
  return text
    .replace(/(主人|宠物)[：:]\s*/g,'')
    .replace(/\[[^\]]*\]/g,'').replace(/【[^】]*】/g,'')
    .replace(/<[^>]*>/g,'') // 过滤 HTML 标签
    .replace(/\*\*/g,'').replace(/```[\s\S]*?```/g,'').replace(/`[^`]*`/g,'') // 过滤 Markdown 代码
    .replace(/(?:https?:\/\/|www\.)[^\s]*/g,'') // 过滤 URL
    .replace(/^(?:主人|宠物)[：:]\s*/gm,'') // 多行下的角色前缀
    .replace(/[（(][^）)]*[）)]/g,'')
    .replace(/\d{4}\/\d{1,2}\/\d{1,2}\s+\d{1,2}:\d{2}(:\d{2})?\s*/g,'') // 时间戳（含可选秒）
    .replace(/^[-*+]\s+/gm,'') // 列表符号（行首的 - / * / + 后跟空格，不匹配金额等数字）
    .trim();
}
// TTS 语音过滤（去掉 emoji、标签、角色前缀、特殊符号，保留标点符号）
function cleanForTTS(text){
  return text
    .replace(/(主人|宠物)[：:]\s*/g,'')
    .replace(/\[[^\]]*\]/g,'').replace(/【[^】]*】/g,'')
    .replace(/<[^>]*>/g,'') // 过滤 HTML 标签
    .replace(/```[\s\S]*?```/g,'').replace(/`[^`]*`/g,'') // 过滤代码
    .replace(/(?:https?:\/\/|www\.)[^\s]*/g,'') // 过滤 URL
    .replace(/\p{Extended_Pictographic}/gu,'') // 过滤 emoji
    .replace(/\*\*/g,'')
    .replace(/\d{4}\/\d{1,2}\/\d{1,2}\s+\d{1,2}:\d{2}(:\d{2})?\s*/g,'')
    .replace(/[♥❤💕💖💗💘💙💚💛💜💝💞]/g,'')
    .replace(/[#@$%^&+=<>~/\\|`*]/g,'')
    .replace(/\s{2,}/g,' ') // 合并多余空格
    .trim();
}
// AI配置（独立文件，不与聊天记录混在一起）
let aiCfg={};
function modelSupportsVision(model){
  const m=(model||'').toLowerCase();
  // 2026 国产多模态支持（DeepSeek V4 当前 API 仅接受文本、GLM 为纯文本，均不支持视觉）
  if(/^(qwen|kimi|doubao|ernie)/.test(m))return true;
  if(/vl|vision|多模态/.test(m))return true;
  return false;
}
// 判断模型是否支持 thinking（深度思考/推理）参数
function modelSupportsThinking(model){
  const m=(model||'').toLowerCase();
  // 2026 国产主流大模型均支持深度思考/推理模式
  if(/^(deepseek|qwen|glm|kimi|doubao|ernie)/.test(m))return true;
  if(/reason|think|reasoner|r1|-t1|o1|o3/.test(m))return true;
  return false;
}
// 取视觉能力：已知模型以官方判断为准（避免旧存档误开导致发送 image_url 报 400），自定义模型以用户保存意图为准
function getVisionCapability(){
  const model=aiCfg.model;
  const KNOWN=['deepseek-v4-flash','qwen-max','glm-5.2','kimi-k2','doubao-seed-2.0-pro','ernie-5.0'];
  if(KNOWN.includes(model)) return modelSupportsVision(model);
  return aiCfg.vision!==undefined ? aiCfg.vision : modelSupportsVision(model);
}
async function callAI(messages, signal, tools, enableThinking) {
    // 将图片数据从 tool 消息转为 user 多模态格式，让 AI 真正"看到"图片
    // 仅当模型支持视觉时才转换；否则保持纯文本，避免部分模型（如 DeepSeek）接口不支持 image_url 而 400 报错
    // 保留原 tool 消息（content 改为占位）以维持 tool_call_id 配对，图片作为末尾 user 消息追加，
    // 避免 strict 接口报 "tool_calls must be followed by tool messages"
    const vision = getVisionCapability();
    const imageMsgs = [];
    const msgs = messages.map(m => {
      if (vision && typeof m.content === 'string' && m.content.startsWith('📷 图片数据: ')) {
        const dataUrl = m.content.slice('📷 图片数据: '.length);
        m.content = '📷 图片数据: [图片已附在末尾 user 消息]';
        imageMsgs.push({ role: 'user', content: [{ type: 'text', text: '上方 read_image 读取到的图片：' }, { type: 'image_url', image_url: { url: dataUrl } }] });
        return m;
      }
      return m;
    });
    if (imageMsgs.length) msgs.push(...imageMsgs);
  const url=(aiCfg.url||'https://api.deepseek.com/v1')+'/chat/completions';
  const body={model:aiCfg.model||'deepseek-v4-flash',messages:msgs};
  if(tools)body.tools=tools;
  // 深度思考：由"开启深度思考模式"复选框控制。勾选才把 thinking:{type:'enabled'} 拼进请求；
  // 未勾选则明确下发 {type:'disabled'}（不拼接开启代码）。复选框优先于调用处参数。
  const supportsThink=modelSupportsThinking(aiCfg.model);
  let think;
  if(aiCfg.thinking!==undefined)think=aiCfg.thinking;            // 复选框优先
  else if(enableThinking!==undefined)think=enableThinking;       // 调用处兜底
  else think=supportsThink;                                      // 模型默认
  if(supportsThink){
    if(think)body.thinking={type:'enabled'};
    else body.thinking={type:'disabled'};
  }
  console.log('----- 发给AI的完整请求 -----');
  console.log(JSON.stringify(body, null, 2));
  console.log('---------------------------');
  body.stream=true;
  const res=await fetch(url,{method:'POST',signal,headers:{'Content-Type':'application/json','Authorization':'Bearer '+aiCfg.apiKey},body:JSON.stringify(body)});
  if(!res.ok){console.error('AI调用失败:',res.status,await res.text());return null;}
  // 流式读取 SSE 响应
  const reader=res.body.getReader();
  const decoder=new TextDecoder();
  let buf='',done=false;
  let resultMsg=null;
  while(!done){
    const {done:rd,done:rdone,value}=await reader.read();
    if(rd||rdone)break;
    buf+=decoder.decode(value,{stream:true});
    const lines=buf.split('\n');
    buf=lines.pop()||'';
    for(const line of lines){
      if(!line.startsWith('data: '))continue;
      const data=line.slice(6).trim();
      if(data==='[DONE]'){done=true;break;}
      let chunk;
      try{chunk=JSON.parse(data);}catch(e){continue;}
      const delta=chunk.choices?.[0]?.delta;
      if(!delta)continue;
      if(!resultMsg)resultMsg={role:'assistant',content:'',tool_calls:[]};
      if(delta.reasoning_content)resultMsg.reasoning_content=(resultMsg.reasoning_content||'')+delta.reasoning_content;
      if(delta.content)resultMsg.content+=delta.content;
      if(delta.tool_calls){
        for(const tc of delta.tool_calls){
          if(tc.index===undefined)continue;
          while(resultMsg.tool_calls.length<=tc.index)resultMsg.tool_calls.push({id:'',type:'function',function:{name:'',arguments:''}});
          const t=resultMsg.tool_calls[tc.index];
          if(tc.id)t.id=tc.id;
          if(tc.type)t.type=tc.type;
          if(tc.function){
            if(tc.function.name)t.function.name+=tc.function.name;
            if(tc.function.arguments)t.function.arguments+=tc.function.arguments;
          }
        }
      }
    }
  }
  if(!resultMsg)return null;
  // tool_calls 为空数组时清理掉，与 non-streaming 格式一致
  if(resultMsg.tool_calls&&resultMsg.tool_calls.length===0)delete resultMsg.tool_calls;
  console.log('----- AI流式返回完成 -----');
  console.log(JSON.stringify(resultMsg,null,2));
  console.log('---------------------------');
  return {choices:[{message:resultMsg}]};
}

  {type:'function',function:{name:'web_fetch',description:'抓取网页文字，获取文档/资料信息',strict:true,parameters:{type:'object',properties:{url:{type:'string',description:'完整 URL（含 https://）'}},required:['url'],additionalProperties:false}}},
  {type:'function',function:{name:'rename_symbol',description:'符号重命名：将代码中的函数名/变量名/类名等精确重命名（按单词边界匹配，不误伤子串），会搜索工作空间内所有代码文件并全部替换',strict:true,parameters:{type:'object',properties:{oldName:{type:'string',description:'旧符号名（如 getUserInfo）'},newName:{type:'string',description:'新符号名（如 fetchUserProfile）'},searchPath:{type:'string',description:'搜索目录，不传则搜整个工作空间'},fileType:{type:'string',description:'限定文件类型扩展名，如 js/py/html，不传则搜所有代码文件'}},required:['oldName','newName'],additionalProperties:false}}},
  ];
  // read_image 已合并进 read_files（按扩展名自动识别图片，视觉门控在工具内处理）
  let result = all;
  // 用户在右键菜单「🧰 内置工具」中取消的工具，不发给 AI（默认全选/全启用）
  const d = window.toolCfg && window.toolCfg.disabled;
  if(d && d.size) result = result.filter(t=>!d.has(t.function.name));
  return result;
}

async function ensureToolsCfg(){

// MCP 工具缓存：避免每次 AI 调用都重复拉取，30 秒后自动过期
let _cachedMcpTools=null;
let _cachedMcpToolsTime=0;
const MCP_CACHE_TTL=30000;
// 强制刷新缓存（技能增删后立即调用，消除缓存窗口期）
function invalidateMcpCache(){_cachedMcpTools=null;_cachedMcpToolsTime=0;}
async function getMcpTools(){
  const now=Date.now();
  if(!_cachedMcpTools||now-_cachedMcpToolsTime>MCP_CACHE_TTL){
    try{const r=await fetch('/mcp-tools');if(r.ok){_cachedMcpTools=await r.json();_cachedMcpToolsTime=now;}}catch(e){}
    if(!_cachedMcpTools)_cachedMcpTools=[];
  }
  return _cachedMcpTools;
}

          if(name==='delete_file'){const r=await fetchTool('/delete-file',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:args.path})},{signal:ac.signal});if(r.ok){st({text:'✓ 删除 '+args.path,ok:true});return '✓ delete_file '+args.path;}const de=await r.json().catch(()=>({}));st({text:'✗ 删除 '+args.path,err:true});return '✗ delete_file '+args.path+': '+(de.error||'请求失败');}
          if(name==='search'){const ctx=args.context!==undefined?args.context:2;const cs=args.caseSensitive?'true':'false';const ft=args.type||'';const p=args.path||'.';const r=await fetchTool('/search?q='+encodeURIComponent(args.q)+'&context='+ctx+'&caseSensitive='+cs+'&type='+ft+(p!=='.'?'&path='+encodeURIComponent(p):''),{},{signal:ac.signal});if(r.ok){const data=await r.json();const rs=data.results||[];const fs=data.fileStats||[];st({text:'✓ 搜索 "'+args.q+'" '+rs.length+'个结果'+(data.total>rs.length?'/共'+data.total+'':''),ok:true});if(rs.length===0)return '✓ search "'+args.q+'" (0个结果)';const more=data.truncated?'\n⚠️ 结果较多（≥'+data.total+'条），仅显示前500个，建议用更精确的关键词或限定 fileType 缩小范围':'';const summary='📊 分布：'+fs.map(f=>f.file+'('+f.matches+'处)').join('、')+'\n\n';const details=rs.map(d=>'  '+d.file+':'+d.line+(ctx>0?'\n'+d.context.split('\n').map(l=>'    '+l).join('\n'):'')).join('\n---\n');if(details.length>25000)return '✓ search "'+args.q+'" ('+rs.length+'个'+(data.total>rs.length?'/共'+data.total:'')+')\n'+summary+details.substring(0,25000)+'\n...(详情过长已截断)'+more;return '✓ search "'+args.q+'" ('+rs.length+'个'+(data.total>rs.length?'/共'+data.total:'')+')\n'+summary+details+more;}st({text:'✗ 搜索失败',err:true});return '✗ search';}

                if(!r.ok){st({text:'✗ 抓取失败',err:true});return '✗ web_fetch: 请求失败';}
                const rd=await r.json();

                full+=(i>0?'\n...(接上一段)...\n':'')+(rd.content||'');
                if(!rd.truncated){truncated=false;break;}
                truncated=true; offset+=PAGE;
              }
              if(full.length>HARD_CAP)full=full.substring(0,HARD_CAP)+'\n...(内容过长已截断，共 '+full.length+' 字，仅展示前 '+HARD_CAP+' 字)';
              else if(truncated)full+='\n⚠️ 网页内容较长，仅展示前 '+(MAX_PAGES*PAGE)+' 字，更后面的内容可再次抓取获取';
              st({text:'✓ 已获取 '+args.url+(truncated?'（已自动翻页）':'')+(full.length>HARD_CAP?'（截断）':''),ok:true});
              return full||'(空内容)';
            }catch(e){if(ac.signal&&ac.signal.aborted)throw e;st({text:'✗ 抓取异常',err:true});return '✗ web_fetch: '+e.message;}
          }

            try{
              const r=await fetchTool('/rename-symbol',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({oldName:args.oldName,newName:args.newName,searchPath:args.searchPath,fileType:args.fileType})},{timeout:60000,signal:ac.signal});

              const rd=await r.json();
              if(rd.error){st({text:'✗ '+rd.error,err:true});return '✗ rename_symbol: '+rd.error;}
              if(rd.changed>0){
                didMutate=true;
                const errFiles=rd.changes.filter(c=>c.lint&&!c.lint.ok);

              }else{
                st({text:'⚠️ '+rd.message,ok:true});
              }
              return rd.message;
            }catch(e){if(ac.signal&&ac.signal.aborted)throw e;st({text:'✗ 重命名异常',err:true});return '✗ rename_symbol: '+e.message;}
          }

          st({text:icon+' 未知工具: '+name,err:true});return name+': 未知工具';
        }catch(e){if(ac.signal&&ac.signal.aborted)throw e;st({text:icon+' '+label+' 异常',err:true});return name+': 执行异常 '+e.message;}
      }
      const results=await Promise.all(execTcs.map(tc=>execTC(tc).then(r=>({tc,result:r}))));
      for(const{tc,result}of results){const tMsg={role:'tool',tool_call_id:tc.id,content:result||'none'};messages.push(tMsg);sessionMsgs.push(tMsg);}

    }
  }
  return {finalReply,didMutate,sessionMsgs};
}

function getModelContextWindow() {
  // 用户已在配置页设置了上下文值 → 优先使用
  if (aiCfg.contextWindow && aiCfg.contextWindow > 0) return aiCfg.contextWindow;
  // 回退到已知模型映射

// 估算 token 数（中文 ~1.5字符/token）
function estTokens(text){return Math.ceil((text||'').length/1.5);}
function estMsgsTokens(msgs){return msgs.reduce((s,m)=>s+estTokens(m.content)+(m.role?5:0),0);}

// ===== 共享 AI 调用工具：构建消息上下文 + 执行工具循环（减少三个调用者的重复代码） =====
async function buildAiContext(scenario) {
  const msgs = [{ role: 'system', content: getRole() }];
  let experiencesMsg = null;
  let instructionsMsg = null;
  // 自定义指令放在角色之后
  instructionsMsg = await injectInstructions(msgs);
  // 工作记忆放在自定义指令之后
  if(chatCfg.workMemory)msgs.push({role:'system',content:'【上次工作记忆】\n'+chatCfg.workMemory});
  // 摘要放在工作记忆之后
  if (Array.isArray(chatCfg.experiences) && chatCfg.experiences.length > 0) {
    experiencesMsg = { role: 'system', content: chatCfg.experiences.map(e => e.timeRange + '\n' + e.summary).join('\n\n') };
    msgs.push(experiencesMsg);
  }
  // 近期历史放在摘要之后（含用户最新消息）
  const hist = chatCfg.msgs || [];
  if (hist.length > 0) {
    msgs.push({ role: 'system', content: hist.map(x => '【' + x.time + '】' + (x.role === 'user' ? '主人' : '宠物') + '：' + x.content).join('\n') });
  }
  const timeHint = '当前时间是' + getTime() + '，' +
    (scenario === 'greet' ? '你可以自主决定做任何事' :
     scenario === 'startup' ? '主人在电脑上打开了你，你可以自主决定做任何事' :
     '主人跟你聊天了，你可以自主决定做任何事');
  const timeHintMsg = { role: 'system', content: timeHint };
  msgs.push(timeHintMsg);
  // 思考指引放在时间提示后面（在所有固定信息的最后），动态拼接项目目录、文件索引和系统信息
  let projectText = '';
  let osText = '';
  try {
    const [pR, iR, osR] = await Promise.all([fetch('/workspace'), fetch('/workspace-index'), fetch('/platform')]);
    if (osR.ok) {
      const plat = await osR.text();
      osText = plat === 'win32' ? 'Windows' : plat === 'darwin' ? 'macOS' : 'Linux';
    }
    if (pR.ok) {
      try {
        const ws = await pR.json();
        projectText += '\n工作空间：\n' + (ws.current || '') + '/';
      } catch(e) { projectText += '\n工作空间：' + (await pR.text().catch(() => '')); }
    }
    if (iR.ok) {
      const idx = await iR.json();
      const lines = idx.slice(0, 1000).map((f, i, a) => {
        const prefix = i === a.length - 1 ? '└── ' : '├── ';
        return prefix + f.path + (f.isDir ? '/' : '');
      });
      projectText += '\n' + lines.join('\n') + (idx.length > 1000 ? '\n  └── ...(仅显示前1000个)' : '');
    }
  } catch (e) {}
  const thinkGuideMsg = { role: 'system', content: '【思考指引】\n• 先思考要聊天还是要执行任务？\n• 聊天的话记得在内容最后面加上对应的情绪标签，例如[情绪:开心]，情绪可选：开心、生气、悲伤、疑问、惊讶、害羞\n• 执行任务的话先明确做什么然后思考出计划然后根据计划制定步骤，制定的步骤不能有冗余的操作，能在一个步骤完成的不要分多步。\n所有的任务都要在工作空间内进行，文件操作优先使用专用工具而非 shell 命令(当前系统是 ' + (osText || 'Windows') + ')\n• 修 bug 时如果连续尝试 3 次仍未解决，停止操作并将问题告诉主人，让主人提供报错信息来协助定位。' + projectText };
  msgs.push(thinkGuideMsg);
  await ensureToolsCfg();
  const tools = makeTools();
  try { const m = await getMcpTools(); if (m.length > 0) tools.push(...m); } catch (e) {}
  // instructionMsgs 仅放 timeHint：历史由 histBlock 注入、persona 由 systemRoleMsg 注入，
  // 避免历史在每轮工具循环里被重复发送（原 slice(-2) 会把历史再塞一次）
  return { msgs, tools, systemRoleMsg: msgs[0], experiencesMsg, instructionsMsg, instructionMsgs: [timeHintMsg, thinkGuideMsg] };
}
// 构建发给 AI 的完整消息数组
function buildAiMsgs(includeSummary=true){
  const history=chatCfg.msgs||[];
  const msgs=[
    // 所有摘要注入为 system 消息
    ...(includeSummary&&Array.isArray(chatCfg.experiences)&&chatCfg.experiences.length>0?chatCfg.experiences.map(e=>({role:'system',content:e.timeRange+'\n'+e.summary})):[]),
    // 聊天记录按原始 role 展开，content 前加上说话人和时间
    ...history.map(m=>({role:m.role,content:(m.role==='user'?'主人：':'宠物：')+' ['+m.time+'] '+m.content})),
  ];
  return msgs;
}

async function truncateMsgs(){
  const ctxWindow = getModelContextWindow();
  const limit=Math.floor(ctxWindow*0.15);

  // 循环截断，直到消息量在限制内
  for(let iter=0;iter<10;iter++){
    const msgs=chatCfg.msgs||[];
    if(msgs.length<2)return;

    const allMsgs=buildAiMsgs();
    const totalTokens=estMsgsTokens(allMsgs);
    if(totalTokens<=limit)return;

    // 超出 limit，取前 80% 的消息进行摘要，留 20%
    const cutCount=Math.max(Math.ceil(msgs.length*0.8),1);
    const dropped=msgs.slice(0,cutCount);
    const kept=msgs.slice(cutCount);
    if(dropped.length<1)return;

    // 让 AI 生成摘要
    const aiMsgs=[
      {role:'system',content:getRole()},
      {role:'system',content:dropped.map(x=>'【'+x.time+'】'+(x.role==='user'?'主人':'宠物')+'：'+x.content).join('\n')},
      {role:'system',content:'作为主人的灵魂伴侣，为了能在有限的记忆中更好的理解主人，你需要将与主人的所有聊天内容以你的口吻讲述成你的经历，不输出开场白和解释。'},
    ];
    const ac2=new AbortController();const t2=setTimeout(()=>ac2.abort(),120000);
    const d=await callAI(aiMsgs,ac2.signal);
    clearTimeout(t2);
    if(!d)return;

    const reply=d.choices[0].message.content.trim();

    // 提取第一条和最后一条消息的时间作为时间范围
    const firstTime=dropped[0]?.time||'未知';
    const lastTime=dropped[dropped.length-1]?.time||'未知';

    // 保存摘要到 .experiences.json（追加模式）
    chatCfg.experiences=(chatCfg.experiences||[]).concat([{timeRange:firstTime+' - '+lastTime,summary:reply}]);
    saveExperiences();

    // 旧消息存档
    try{
      const oldArr=(await store.load('chat-archive'))||[];
      await store.save('chat-archive',[...oldArr,...dropped]);
    }catch(e){console.warn(e.message||e)}

    // 检查 AI 调用期间是否有新消息加入（如 autoGreet），追加到截断结果后面
    const extraMsgs=chatCfg.msgs.length>msgs.length?chatCfg.msgs.slice(msgs.length):[];
    chatCfg.msgs=extraMsgs.length>0?[...kept,...extraMsgs]:kept;
    saveChatCfg();
    // 继续下一次循环，检查截断后是否仍需再截
  }
}

function parseEmotionTag(text){
  const tags=[...text.matchAll(/\[情绪\s*:\s*([^\]]+)\]/g),...text.matchAll(/【情绪\s*:\s*([^】]+)】/g)];
  const valid=Object.keys(emotionActions);
  const matched=tags.map(t=>t[1].trim()).filter(t=>valid.includes(t));
  return matched.length>0?matched[matched.length-1]:null
}

// 工具类请求：自带超时，且可被用户"中止"信号中断（signal 传外层 abort 控制器）
async function fetchTool(url, opts = {}, { timeout = 300000, signal = null } = {}) {
  const ctrl = new AbortController();
  const tm = setTimeout(() => ctrl.abort(), timeout);
  const onAbort = () => ctrl.abort();
  if (signal) {
    if (signal.aborted) ctrl.abort();
    else signal.addEventListener('abort', onAbort, { once: true });
  }
  try {
    return await fetch(url, { ...opts, signal: ctrl.signal });
  } finally {
    clearTimeout(tm);
    if (signal) signal.removeEventListener('abort', onAbort);
  }
}

      const ctx=await buildAiContext('chat');

    if(!finalReply){

    if(!emotionTag && finalReply){const p=parseEmotionTag(finalReply);if(p)emotionTag=p;}

async function tryGenerateWorkMemory(sessionMsgs, finalReply){
  if(!(sessionMsgs&&sessionMsgs.length>0))return;
  try{
    let toolLog='';let round=0;
    for(const sm of sessionMsgs){
      if(sm.role==='assistant'&&sm.tool_calls){
        for(const tc of sm.tool_calls){round++;const fn=tc.function.name;let args='';try{args=JSON.stringify(JSON.parse(tc.function.arguments),null,2);}catch(e){args=tc.function.arguments;}toolLog+=`第${round}步：调用工具【${fn}】\n参数：\n${args}\n`;}
      }else if(sm.role==='tool'){
        const result=(sm.content||'').length>2000?sm.content.substring(0,2000)+'\n...(结果过长已截断)':(sm.content||'');
        toolLog+=`执行结果：\n${result}\n\n`;
      }
    }
    const workMsgs=[
      {role:'system',content:getRole()},
      {role:'user',content:'以下是刚才你与主人的对话中，你的思考过程、调用的工具和执行结果。请按照下面的要求总结工作记忆。'},
      {role:'system',content:'【本次工具调用记录】\n'+toolLog+'\n【最终回复】\n'+(finalReply||'')},
      {role:'system',content:'请总结工作记忆，注意精简，只记录决策和关键信息，不要逐条罗列工具调用细节。只输出以下格式，不要输出其他文字：\n\n【任务】本次要完成的目标\n【计划】制定的计划\n【步骤】\n1. 做了什么、为什么这么做、关键发现\n2. ...\n【最终结果】任务完成情况'},
    ];
    const wAc=new AbortController();const wT=setTimeout(()=>wAc.abort(),30000);
    const d=await callAI(workMsgs,wAc.signal,null,true);
    clearTimeout(wT);
    if(d&&d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content){
      const wmContent=d.choices[0].message.content.trim();
      await store.save('work-memory',{time:getTime(),content:wmContent});
      chatCfg.workMemory=wmContent;
    }
  }catch(e){if(e.name!=='AbortError')console.warn('[work-memory]',e.message);}
}

  const m=last.time.match(/(\d+)\/(\d+)\/(\d+)[^\d]+(\d+):(\d+)/);
  if(!m)return 0;
  const dt=new Date(+m[1],+m[2]-1,+m[3],+m[4]||0,+m[5]||0).getTime();
  if(isNaN(dt))return 0;
  return Math.floor((Date.now()-dt)/1000);
}

// 关闭并释放 AudioContext
function closeAudioCtx(){
  if(audioCtx&&audioCtx.state!=='closed'){
    try{audioCtx.close()}catch(e){}
    audioCtx=null;
  }
}
// 预预热 AudioContext + Edge TTS 连接，加速首次语音
function warmAudio(){
  // 先关闭旧 AudioContext 再新建，防止资源泄漏
  closeAudioCtx();
  try{audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){console.warn(e.message||e)}
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
  // 预热 Edge TTS + decodeAudioData 流水线
  if(voiceEnabled){
    fetch('/tts',{method:'POST',headers:{'Content-Type':'text/plain'},body:'预热'}).then(async r=>{
      if(!r.ok)return;
      const buf=await r.arrayBuffer();
      if(buf&&buf.byteLength>=100&&audioCtx)try{audioCtx.decodeAudioData(buf.slice(0))}catch(e){}
    }).catch(()=>{});
  }
}

// 自动眨眼：每 3~7 秒快速闭眼再睁眼
function startBlink(){
  clearTimeout(blinkTimer);
  const doBlink=()=>{
    setP('ParamEyeLOpen',0);
    setP('ParamEyeROpen',0);
    setTimeout(()=>{
      setP('ParamEyeLOpen',1);
      setP('ParamEyeROpen',1);
    },120);
  };
  const scheduleBlink=()=>{
    blinkTimer=setTimeout(()=>{
      doBlink();
      scheduleBlink();
    },3000+Math.random()*4000);
  };
  scheduleBlink();
}
// ========= 动作动画系统（独立于当前表情/手势） =========
function getCM(){return model?.internalModel?.coreModel}
let animSeq=0;
let currentActionSeq=0;
let _pageDestroyed=false; // 页面销毁标记，用于停止动画
function animateTo(id,to,dur){
  return new Promise(r=>{const cm=getCM();if(!cm||_pageDestroyed){r();return}
    const idx=getPIdx(id);if(idx<0){r();return}
    const from=cm._parameterValues[idx],st=performance.now(),seq=currentActionSeq
    const tick=()=>{
      if(seq!==currentActionSeq||_pageDestroyed){r();return} // 被新动作取消或页面已销毁
      const t=Math.min((performance.now()-st)/dur,1)
      const e=t<.5?2*t*t:-1+(4-2*t)*t
      cm._parameterValues[idx]=from+(to-from)*e
      if(t<1)requestAnimationFrame(tick);else r()}
    tick()})
}

      case'害羞伸右低头':await parallel([animateTo('AJYSS1',2,200),animateTo('AJYSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleY',-10,400),animateTo('ParamEyeLOpen',.3,300),animateTo('ParamEyeROpen',.3,300)]);await sleep(4000);break
      // 脸红 + 双指 + 低头
      case'害羞双指低头':await parallel([animateTo('AJZSS1',2,200),animateTo('AJZSYC',2,200),animateTo('AJYSS1',2,200),animateTo('AJYSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleY',-12,400),animateTo('ParamEyeLOpen',.3,300),animateTo('ParamEyeROpen',.3,300)]);await sleep(4000);break
      // 脸红 + 左手握拳 + 持续低头（长时）
      case'害羞持续低头':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleY',-16,600),animateTo('ParamEyeLOpen',.2,300),animateTo('ParamEyeROpen',.2,300)]);await sleep(7000);break
      // 脸红 + 左手握拳 + 左歪头
      case'害羞左歪头':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleZ',-12,400),animateTo('ParamEyeLOpen',.4,300),animateTo('ParamEyeROpen',.4,300)]);await sleep(4000);break
      // 脸红 + 右手握拳 + 右歪头
      case'害羞右歪头':await parallel([animateTo('AJYSS1',1,200),animateTo('AJYSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleZ',12,400),animateTo('ParamEyeLOpen',.4,300),animateTo('ParamEyeROpen',.4,300)]);await sleep(4000);break
      // 脸红 + 双拳 + 低头 + 快速抬头（偷看）
      case'害羞偷看':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJYSS1',1,200),animateTo('AJYSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleY',-14,400),animateTo('ParamEyeLOpen',.2,300),animateTo('ParamEyeROpen',.2,300)]);await sleep(1500);await animateTo('ParamAngleY',-2,200);await sleep(800);await animateTo('ParamAngleY',-14,200);await sleep(2000);break
      // 脸红 + 爱心眼 + 左手握拳 + 低头
      case'害羞爱心眼':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJAX',1,200),animateTo('AJBAX',1,200),animateTo('AJYGGYC',1,200),animateTo('AJLH',1,300),animateTo('ParamAngleY',-12,400),animateTo('ParamEyeLOpen',.4,300),animateTo('ParamEyeROpen',.4,300)]);await sleep(4500);break
      // 脸红 + 卖萌 + 左手握拳 + 歪头
      case'害羞卖萌':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJLH',1,300),animateTo('AJQQ',1,300),animateTo('ParamAngleZ',10,400),animateTo('ParamAngleY',-5,300)]);await sleep(4000);break
      // 脸红 + 双拳 + 摇头
      case'害羞捂脸摇头':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJYSS1',1,200),animateTo('AJYSYC',2,200),animateTo('AJLH',1,300)]);for(let i=0;i<4;i++)await animateTo('ParamAngleX',i%2?0:14,150);await sleep(2000);break
      // 脸红 + 左手握拳 + 左偏头 + 低头
      case'害羞转身':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleZ',-16,500),animateTo('ParamAngleY',-8,400),animateTo('ParamEyeLOpen',.3,300),animateTo('ParamEyeROpen',.3,300)]);await sleep(5000);break
      // 脸红 + 左手握拳 + 左右微摇（扭捏）
      case'害羞扭捏':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamEyeLOpen',.4,300),animateTo('ParamEyeROpen',.4,300)]);for(let i=0;i<6;i++){await animateTo('ParamAngleX',8,150);await animateTo('ParamAngleX',-8,150)}await sleep(1500);break
      // 脸红 + 左手食指 + 歪头
      case'害羞伸左歪头':await parallel([animateTo('AJZSS1',2,200),animateTo('AJZSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleZ',-8,400),animateTo('ParamEyeLOpen',.4,300),animateTo('ParamEyeROpen',.4,300)]);await sleep(4000);break
      // 脸红 + 右手小指 + 歪头
      case'害羞伸右歪头':await parallel([animateTo('AJYSS1',2,200),animateTo('AJYSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleZ',8,400),animateTo('ParamEyeLOpen',.4,300),animateTo('ParamEyeROpen',.4,300)]);await sleep(4000);break
      // 脸红 + 双指 + 低头（玩手指）
      case'害羞低头玩手指':await parallel([animateTo('AJZSS1',2,200),animateTo('AJZSYC',2,200),animateTo('AJYSS1',2,200),animateTo('AJYSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleY',-12,400),animateTo('ParamEyeLOpen',.2,300),animateTo('ParamEyeROpen',.2,300)]);await sleep(5000);break
      // 脸红 + 双拳 + 持续低头 + 半闭眼（不敢看）
      case'害羞不敢看':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJYSS1',1,200),animateTo('AJYSYC',2,200),animateTo('AJLH',1,300),animateTo('ParamAngleY',-16,600),animateTo('ParamEyeLOpen',.1,400),animateTo('ParamEyeROpen',.1,400)]);await sleep(6500);break
      // 脸红 + 爱心眼 + 左手握拳 + 低头 + 微笑
      case'害羞心动':await parallel([animateTo('AJZSS1',1,200),animateTo('AJZSYC',2,200),animateTo('AJAX',1,200),animateTo('AJBAX',1,200),animateTo('AJYGGYC',1,200),animateTo('AJLH',1,300),animateTo('ParamAngleY',-10,400),animateTo('ParamEyeLOpen',.4,300),animateTo('ParamEyeROpen',.4,300),animateTo('ParamMouthOpenY',.15,200)]);await sleep(4500);break
    }
    // 平滑复位所有临时参数，避免瞬间跳动
    if(!voiceAnimLock&&currentActionSeq===mySeq)await parallel([
      ...expAll.map(p=>animateTo(p,0,200)),
      ...gestAll.map(p=>animateTo(p,0,200)),
      animateTo('ParamAngleX',0,200),animateTo('ParamAngleY',0,200),animateTo('ParamAngleZ',0,200),
      animateTo('ParamMouthOpenY',0,200),animateTo('ParamMouthForm',0,200),
      animateTo('ParamEyeLOpen',1,200),animateTo('ParamEyeROpen',1,200),
      animateTo('WZY',0,200),
    ]);
  }finally{
    // 语音播放时不复位，由 onended 统一处理
    if(voiceAnimLock)return;
    // 如果已被新动作取代，跳过清理（避免干扰新动作）
    if(currentActionSeq!==mySeq)return;
    // 兜底复位（此时参数已在平滑动画中到达目标值）
    setP('ParamAngleX',0);setP('ParamAngleY',0);setP('ParamAngleZ',0);
    setP('ParamMouthOpenY',0);setP('ParamMouthForm',0);
    setP('ParamEyeLOpen',1);setP('ParamEyeROpen',1);
    setP('WZY',0);
    // 恢复用户手动选中的表情（如果有）
    if(state.expr&&expParams[state.expr])expParams[state.expr].forEach(([p,val])=>setP(p,val));
    // 恢复用户手动选中的手势（如果有）
    Object.values(state.gest).forEach(g=>{if(gestParams[g])gestParams[g].forEach(([p,val])=>setP(p,val))});
  }
}
;(async()=>{

          bubble(msg,false,'[情绪:'+emo+']',true);

          const welEmo=pickRandom(['开心','害羞']);
          bubble(welcome,false,'[情绪:'+welEmo+']',true);
        }
      }
    }
    lastChatTime=Date.now();
    scheduleProactive();
  }catch(e){console.error('启动失败:',e);document.body.innerHTML='<div style="padding:20px;color:red;font:14px sans-serif">启动失败:<br>'+e.message+'</div>'}
})();
