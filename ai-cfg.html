<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>茵茵配置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#f5f5f5;display:flex;flex-direction:column;font:13px/1.5 'Microsoft YaHei','PingFang SC','Hiragino Sans GB',sans-serif}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(135deg,#ff9ec4,#ff6b9d);color:#fff;font-weight:bold;font-size:14px;flex-shrink:0;-webkit-app-region:drag}
#hdr .btn{display:inline-block;cursor:pointer;font-size:15px;opacity:.8;padding:0 6px;-webkit-app-region:no-drag}
#hdr .btn:hover{opacity:1}
.box{flex:1;background:#fff;padding:10px 16px 8px;display:flex;flex-direction:column;overflow-y:auto}
label{display:block;margin:8px 0 4px;color:#666;font-size:12px}
input,select{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:8px;outline:none;font-size:13px;background:#fff;font-family:inherit}
input:focus,select:focus{border-color:#ff6b9d}
.pwd-wrap{position:relative;display:flex;align-items:center}
.pwd-wrap input{padding-right:36px}
.pwd-toggle{position:absolute;right:8px;cursor:pointer;font-size:16px;opacity:.5;user-select:none;line-height:1;padding:0 2px}
.pwd-toggle:hover{opacity:1}
.btns{margin-top:10px}
.btns button{width:100%;border:none;border-radius:8px;padding:7px;cursor:pointer;font-size:13px;background:#ff6b9d;color:#fff}
.btns button:hover{background:#ff528a}
#msg{color:#e74c3c;font-size:12px;text-align:center;min-height:0;line-height:0}
#msg:not(:empty){margin-top:8px;min-height:18px;line-height:1.5}
</style></head>
<body>
<div id="hdr"><span><span class="btn" onclick="window.api?.minimizeWindow()">─</span></span><span>⚙️ 配置AI模型</span><span><span class="btn" onclick="window.close()">✕</span></span></div>
<div class="box">
<label>API 地址</label><input id="cfg-url" placeholder="https://api.deepseek.com/v1"/>
<label>API Key</label>
<div class="pwd-wrap"><input id="cfg-key" type="password" placeholder="sk-..."/><span class="pwd-toggle" id="pwdToggle" onclick="toggleKey()">👁</span></div>
<label>模型名称</label>
<select id="cfg-model" onchange="onModelChange()">
  <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
  <option value="qwen-max">通义千问 Qwen3-Max</option>
  <option value="glm-5.2">智谱 GLM-5.2</option>
  <option value="kimi-k2">Kimi K2.5</option>
  <option value="doubao-seed-2.0-pro">豆包 Seed-2.0 Pro</option>
  <option value="ernie-5.0">文心 ERNIE 5.0</option>
  <optgroup label="— 自定义 —">
    <option value="__custom__">自定义模型...</option>
  </optgroup>
</select>
<input id="cfg-custom-model" placeholder="输入自定义模型名" style="display:none;margin-top:6px"/>
<div id="msg"></div>
<div class="btns"><button class="save" onclick="saveCfg()">保存</button></div>
</div>
<script>
const MODEL_URLS={
  // DeepSeek
  'deepseek-v4-flash':'https://api.deepseek.com/v1',
  // 通义千问
  'qwen-max':'https://dashscope.aliyuncs.com/compatible-mode/v1',
  // 智谱 GLM
  'glm-5.2':'https://open.bigmodel.cn/api/paas/v4',
  // 月之暗面 Kimi
  'kimi-k2':'https://api.moonshot.cn/v1',
  // 豆包（火山引擎 Ark，OpenAI 兼容）
  'doubao-seed-2.0-pro':'https://ark.cn-beijing.volces.com/api/v3',
  // 文心（百度千帆，OpenAI 兼容）
  'ernie-5.0':'https://qianfan.baidubce.com/v2',
};
function onModelChange(){
  const sel=$('cfg-model');
  const customInput=$('cfg-custom-model');
  if(sel.value==='__custom__'){
    customInput.style.display='block';
    customInput.focus();
  }else{
    customInput.style.display='none';
    const url=MODEL_URLS[sel.value];
    if(url)$('cfg-url').value=url;
  }
}
async function loadCfg(){
  try{
    const ac=new AbortController();const tm=setTimeout(()=>ac.abort(),15000);
    const r=await fetch('/load-ai-cfg',{signal:ac.signal});
    clearTimeout(tm);
    if(r.ok){
      const d=await r.json();
      $('cfg-url').value=d.url||'https://api.deepseek.com/v1';
      $('cfg-key').value=d.apiKey||'';
      const model=d.model||'deepseek-v4-flash';
      const knownModels=Object.keys(MODEL_URLS);
      if(!knownModels.includes(model)){
        $('cfg-model').value='__custom__';
        $('cfg-custom-model').value=model;
        $('cfg-custom-model').style.display='block';
      }else{
        $('cfg-model').value=model;
      }
    }
  }catch(e){}
}
async function saveCfg(){
  const url=$('cfg-url').value.trim();
  const key=$('cfg-key').value.trim();
  let model=$('cfg-model').value.trim();
  if(model==='__custom__')model=$('cfg-custom-model').value.trim();
  if(!model)model=$('cfg-model').value.trim();
  const cfg={url,apiKey:key,model};
  try{
    await fetch('/save-ai-cfg',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});
    $('msg').textContent='✅ 配置已保存';
    $('msg').style.color='#27ae60';
    setTimeout(()=>window.close(),800);
  }catch(e){
    $('msg').textContent='❌ 保存失败，请重试';
  }
}
function toggleKey(){
  const inp=$('cfg-key'),tog=$('pwdToggle');
  if(inp.type==='password'){inp.type='text';tog.textContent='🙈';}
  else{inp.type='password';tog.textContent='👁';}
}
function $(id){return document.getElementById(id)}
loadCfg();
(async function initName(){try{const r=await fetch('/load-pet-cfg');if(r.ok){const p=await r.json();const n=p.name||'茵茵';document.title=n+'配置';}}catch(e){}})();
</script>
</body>
</html>
