<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>茵茵工作空间</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#f5f5f7;display:flex;flex-direction:column;font:13px/1.5 'Microsoft YaHei','PingFang SC','Hiragino Sans GB',sans-serif}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(135deg,#ff9ec4,#ff6b9d);color:#fff;font-weight:bold;font-size:14px;flex-shrink:0;-webkit-app-region:drag}
#hdr .btn{display:inline-block;cursor:pointer;font-size:15px;opacity:.8;padding:0 6px;-webkit-app-region:no-drag}
#hdr .btn:hover{opacity:1}
#body{padding:10px 12px;flex:1;display:flex;flex-direction:column}
#list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;min-height:0}
/* 开关样式（对齐内置工具） */
.switch{position:relative;width:42px;height:24px;flex-shrink:0;cursor:pointer}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;inset:0;background:#e0e0e0;border-radius:24px;transition:.2s}
.switch .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.slider{background:#ff6b9d}
.switch input:checked+.slider:before{transform:translateX(18px)}
.item{border-radius:10px;background:#fff;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.item:hover{background:#fff7fb}
.item .info{flex:1;min-width:0}
.item .info .name{font-size:13px;font-weight:bold;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .info .path{font-size:11px;color:#999;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .del{font-size:12px;color:#ccc;cursor:pointer;padding:2px 4px;flex-shrink:0;display:none}
.item:hover .del{display:block}
.item .del:hover{color:#e74c3c}
.item.default .info .name::after{content:'（默认）';color:#bbb;font-weight:normal;margin-left:4px}
#addBtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;margin-top:8px;border:1.5px dashed #ddd;border-radius:10px;cursor:pointer;color:#999;font-size:13px;flex-shrink:0;transition:.15s}
#addBtn:hover{border-color:#ff6b9d;color:#ff6b9d;background:#fff7fb}
</style></head>
<body>
<div id="hdr"><span><span class="btn" onclick="window.api?.minimizeWindow()">─</span></span><span>📁 工作空间</span><span><span class="btn" onclick="window.close()">✕</span></span></div>
<div id="body">
  <div id="list"></div>
  <div id="addBtn" onclick="addWorkspace()">➕ 新建工作空间</div>
</div>
<script>
let list = [];
let current = '';

async function load(){
  const r = await fetch('/workspace').then(r => r.json());
  current = r.current || '';
  list = Array.isArray(r.list) ? r.list : [];
  render();
}
function render(){
  const container = document.getElementById('list');
  container.innerHTML = '';
  const def = list[0];
  for (const p of list) {
    const isDef = p === def;
    const isOn = p === current;
    const div = document.createElement('div');
    div.className = 'item' + (isDef ? ' default' : '');
    div.title = esc(p); // 鼠标悬停显示完整路径
    const sw = document.createElement('label'); sw.className = 'switch';
    const cb = document.createElement('input'); cb.type = 'checkbox'; if (isOn) cb.checked = true;
    const slider = document.createElement('span'); slider.className = 'slider';
    cb.addEventListener('change', () => {
      if (cb.checked) selectWorkspace(p, true);
      else cb.checked = true; // 已选中的不允许取消
    });
    sw.appendChild(cb); sw.appendChild(slider);
    sw.addEventListener('click', (e) => { e.stopPropagation(); });
    div.innerHTML = '<div class="info"><div class="name">' + esc(p.split(/[\\/]/).pop() || p) + '</div><div class="path">' + esc(p) + '</div></div>' + (isDef ? '' : '<span class="del" onclick="event.stopPropagation();removeWorkspace(\'' + escJs(p) + '\')">✕</span>');
    div.appendChild(sw);
    container.appendChild(div);
  }
}
async function saveAndRender(){
  await fetch('/workspace', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ current, list }) });
  render();
}
async function selectWorkspace(path, on){
  if (!on || path === current) return;
  current = path;
  await saveAndRender();
}
async function addWorkspace(){
  const folder = await window.api?.openFolderDialog();
  if (!folder) return;
  if (list.includes(folder)) { selectWorkspace(folder, true); return; }
  list.push(folder);
  current = folder;
  await saveAndRender();
}
async function removeWorkspace(path){
  list = list.filter(p => p !== path);
  if (current === path) current = list[0];
  await saveAndRender();
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function escJs(s){ return String(s).replace(/'/g, "\\'"); }
load();
(async function initName(){try{const r=await fetch('/load-pet-cfg');if(r.ok){const p=await r.json();document.title=(p.name||'茵茵')+'工作空间';}}catch(e){}})();
</script>
</body>
</html>
