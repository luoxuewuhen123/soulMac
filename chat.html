<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>与茵茵聊天</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f9f9fb;font:13px/1.5 'Microsoft YaHei','PingFang SC','Hiragino Sans GB',sans-serif;display:flex;flex-direction:column}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(135deg,#ff9ec4,#ff6b9d);color:#fff;font-weight:bold;font-size:14px;flex-shrink:0;-webkit-app-region:drag}
#hdr .btn{display:inline-block;cursor:pointer;font-size:15px;opacity:.8;padding:0 6px;-webkit-app-region:no-drag}
#hdr .btn:hover{opacity:1}


#msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
#msgs .msg{max-width:85%;padding:6px 12px;border-radius:12px;word-break:break-word;overflow-wrap:break-word;line-height:1.5;animation:fadeIn .2s ease}
#msgs .msg .time{display:block;font-size:10px;opacity:.5;margin-top:3px}
#msgs .msg.me{align-self:flex-end;background:#ff6b9d;color:#fff;border-radius:12px 12px 4px 12px}
#msgs .msg.me .time{text-align:right;color:#fff}
#msgs .msg.ai{align-self:flex-start;background:#fff;color:#333;border:1px solid #eee;border-radius:12px 12px 12px 4px}
#msgs .msg.tool{align-self:flex-start;background:#f0f4ff;color:#667799;font-size:11px;padding:4px 10px;border-radius:8px;margin:0;border:none;animation:fadeIn .15s ease}
#msgs .msg.tool.ok{background:#f0fff4;color:#559966}
#msgs .msg.tool.err{background:#fff0f0;color:#996666}
#msgs .msg.thinking{align-self:flex-start;background:#faf7ff;color:#8a7fb0;font-size:11px;padding:4px 10px;border-radius:8px;margin:0;border:none;max-width:85%;animation:fadeIn .15s ease}
#msgs .msg.thinking summary{cursor:pointer;user-select:none;color:#a99fd0;font-size:11px;outline:none}
#msgs .msg.thinking .think-body{margin-top:4px;white-space:pre-wrap;color:#9a8fc0;font-size:11px;line-height:1.5;max-height:220px;overflow-y:auto}
#msgs .loading span{animation:dot 1.4s infinite;display:inline-block;font-size:18px;line-height:1}
#msgs .loading span:nth-child(2){animation-delay:.2s}
#msgs .loading span:nth-child(3){animation-delay:.4s}
#load-more-wrap{text-align:center;padding:6px 0;flex-shrink:0}
#load-more-wrap .lm-btn{color:#ff6b9d;font-size:12px;cursor:pointer;padding:4px 12px;border:1px dashed #ff6b9d;border-radius:12px;display:inline-block;transition:.2s;user-select:none}
#load-more-wrap .lm-btn:hover{background:#fff0f5}
#load-more-wrap .lm-btn.loading{opacity:.6;cursor:default;pointer-events:none}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes dot{0%,20%{opacity:0}50%{opacity:1}80%,100%{opacity:0}}
#inp-wrap{display:flex;align-items:flex-end;border-top:1px solid #eee;padding:8px;background:#fff;flex-shrink:0}
#inp-wrap textarea{flex:1;border:1px solid #ddd;border-radius:12px;padding:7px 12px;outline:none;font-size:13px;font-family:inherit;resize:none;min-height:32px;max-height:100px;line-height:1.4}
#inp-wrap textarea:focus{border-color:#ff6b9d}
#inp-wrap button{margin-left:6px;border:none;background:#ff6b9d;color:#fff;border-radius:20px;padding:7px 14px;cursor:pointer;font-size:13px}
#inp-wrap button:hover{background:#ff528a}
@keyframes tsSpin{to{transform:rotate(360deg)}}
.ts-ico{display:inline-block;width:14px;height:14px;margin-right:4px;font-size:12px;line-height:14px;text-align:center;flex-shrink:0}
.ts-spin{border:2px solid #ddd;border-top-color:#ff6b9d;border-radius:50%;animation:tsSpin .6s linear infinite;vertical-align:middle}
.msg.tool{display:flex;align-items:center;gap:2px}
#msgs .msg.tool .read-summary{display:block;padding:4px 10px;line-height:1.6}
#msgs .msg.tool .read-summary summary{cursor:pointer;user-select:none;color:#559966;font-size:11px;outline:none}
#msgs .msg.tool .read-summary ul{margin:4px 0 0;padding-left:18px;list-style:disc}
#msgs .msg.tool .read-summary li{color:#667799;font-size:11px;word-break:break-word;max-width:100%}
#msgs .msg.tool .edit-summary{display:block;padding:4px 10px;line-height:1.6}
#msgs .msg.tool .edit-summary summary{cursor:pointer;user-select:none;color:#b58900;font-size:11px;outline:none}
#msgs .msg.tool .edit-summary ul{margin:4px 0 0;padding-left:18px;list-style:disc}
#msgs .msg.tool .edit-summary li{color:#667799;font-size:11px;word-break:break-word;max-width:100%}
#msgs .msg.tool .edit-summary li>ul{margin:2px 0 2px 14px;padding-left:14px;list-style:circle}
#msgs .msg.tool .edit-summary li>ul li{color:#998866}
</style></head>
<body>
<div id="hdr"><span><span class="btn" onclick="window.api?.minimizeWindow()">─</span></span><span>💬 与茵茵聊天</span><span><span class="btn" onclick="window.close()">✕</span></span></div>

<div id="msgs"><div id="load-more-wrap"></div></div>
<div id="inp-wrap"><textarea id="chat-input" placeholder="" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea><button id="send-btn" onclick="sendMsg()">发送</button></div>

<script>
const PAGE_SIZE=100;
let chatCfg={msgs:[]};
let aiCfg={};
let petName='茵茵';
let pendingReply=null;
let _cancelLatch=false; // 中断后防显示回复
let archiveMsgs=null;
let archiveLoaded=false;
let archiveIndex=0;        // 已从 archiveMsgs 尾部加载的条数
let displayStart=0;        // 当前显示的第一条在 chatCfg.msgs 中的索引
let _loadingMore=false;    // 防止自动加载重复触发

// 手动解析时间戳为可排序数字，兼容 YYYY/M/D HH:mm 无前导零格式
function timeVal(t){
  if(!t)return 0;
  const m=t.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{1,2})/);
  if(m)return parseInt(m[1])*12*31*24*60 + parseInt(m[2])*31*24*60 + parseInt(m[3])*24*60 + parseInt(m[4])*60 + parseInt(m[5]);
  const d=new Date(t).getTime();
  return isNaN(d)?0:d;
}




async function loadData(){
  try{const r=await fetch('/load-pet-cfg');if(r.ok){const pet=await r.json();if(pet.name)petName=pet.name;}}catch(e){}
  document.title = '与' + petName + '聊天';
  document.querySelector('#hdr span:nth-child(2)').textContent = '💬 与' + petName + '聊天';
  try{const r=await fetch('/load-chat-cfg');if(r.ok)chatCfg=await r.json();}catch(e){}
  try{const r=await fetch('/load-ai-cfg');if(r.ok)aiCfg=await r.json();}catch(e){}
  if(!aiCfg.url)aiCfg.url='https://api.deepseek.com/v1';if(!aiCfg.model)aiCfg.model='deepseek-v4-flash';
  if(!chatCfg.msgs)chatCfg.msgs=[];
  // 默认只显示最近50条
  renderInitial();
  // 检查是否有存档
  try{
    const r=await fetch('/load-chat-archive');
    if(r.ok){
      const data=await r.json();
      if(Array.isArray(data)&&data.length>0){
        // 按时间戳排序保底，避免存档数据顺序错乱导致显示颠倒
        archiveMsgs=data.sort((a,b)=>timeVal(a.time)-timeVal(b.time));
        archiveIndex=0;
      }
    }
  }catch(e){}
  updateLoadMore();
  // AI正在处理时，锁定输入并显示中断按钮
  if(await window.api?.isAiBusy()){
    const inp=$('chat-input');
    const btn=$('send-btn');
    btn.textContent='⏹';
    btn.onclick=cancelAi;
    btn.disabled=false;
    const loadDiv=document.createElement('div');
    loadDiv.className='msg ai loading';
    loadDiv.innerHTML='正在输入<span>.</span><span>.</span><span>.</span>';
    $('msgs').appendChild(loadDiv);
    $('msgs').scrollTop=$('msgs').scrollHeight;
    pendingReply={text:'',div:loadDiv, inp, btn};
  }
  $('msgs').addEventListener('scroll',updateLoadMore);
}

function renderInitial(){
  const msgs=chatCfg.msgs||[];
  // 按时间戳排序保底（旧→新）
  msgs.sort((a,b)=>timeVal(a.time)-timeVal(b.time));
  if(msgs.length===0){addMsg('ai','你好呀~ 有什么想聊的吗？');displayStart=0;return;}
  displayStart=Math.max(0,msgs.length-PAGE_SIZE);
  for(let i=displayStart;i<msgs.length;i++){const m=msgs[i];addMsg(m.role,m.content,m.time);}
}


function updateLoadMore(){
  const wrap=$('load-more-wrap');
  if(!wrap)return;
  const hasMoreMsgs=displayStart>0;
  const hasMoreArchive=archiveMsgs&&!archiveLoaded;
  if(!hasMoreMsgs&&!hasMoreArchive){wrap.innerHTML='<span style="color:#999;font-size:11px">— 已加载全部历史消息 —</span>';return;}
  const msgsEl=$('msgs');
  // 滚动条接近顶部时自动加载
  if(msgsEl.scrollTop<=40&&!_loadingMore){
    loadMore();
  }
}

function loadMore(){
  if(_loadingMore)return;
  _loadingMore=true;
  const msgsEl=$('msgs');
  const prevScrollHeight=msgsEl.scrollHeight;
  const wrap=$('load-more-wrap');
  // 按时间排序
  if(chatCfg.msgs)chatCfg.msgs.sort((a,b)=>timeVal(a.time)-timeVal(b.time));
  // 从 displayStart 往前扩大范围
  let newStart=displayStart;
  if(displayStart>0){
    newStart=Math.max(0,displayStart-PAGE_SIZE);
  }else if(archiveMsgs&&!archiveLoaded){
    // chatCfg 已全部显示，从存档尾部取 50 条加入
    const end=archiveMsgs.length-archiveIndex;
    const start=Math.max(0,end-PAGE_SIZE);
    archiveIndex+=archiveMsgs.slice(start,end).length;
    if(archiveIndex>=archiveMsgs.length)archiveLoaded=true;
  }
  displayStart=newStart;
  // 收集所有要显示的消息（存档已加载部分 + chatCfg），按时间升序
  const allMsgs=[];
  if(archiveMsgs&&archiveIndex>0){
    const loaded=archiveMsgs.slice(archiveMsgs.length-Math.min(archiveIndex,archiveMsgs.length));
    allMsgs.push(...loaded);
  }
  if(chatCfg.msgs){
    for(let i=displayStart;i<chatCfg.msgs.length;i++)allMsgs.push(chatCfg.msgs[i]);
  }
  // 合并后按时间排序保底
  allMsgs.sort((a,b)=>timeVal(a.time)-timeVal(b.time));
  // 重建 DOM
  msgsEl.innerHTML='';
  if(wrap)msgsEl.appendChild(wrap);
  for(const m of allMsgs){
    const div=document.createElement('div');
    div.className='msg '+(m.role==='user'?'me':'ai');
    div.textContent=m.content;
    const t=document.createElement('span');t.className='time';t.textContent=m.time||'';
    div.appendChild(t);
    msgsEl.appendChild(div);
  }
  // 保持滚动位置在新增内容的底部
  msgsEl.scrollTop=msgsEl.scrollHeight-prevScrollHeight;
  if(msgsEl.scrollTop<0)msgsEl.scrollTop=0;
  _loadingMore=false;
  updateLoadMore();
}

function getTime(){ return window.api?.getTime ? window.api.getTime() : (()=>{const d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');})(); }

function addMsg(role,text,time){
  const d=$('msgs');
  if(!d)return;
  const div=document.createElement('div');
  div.className='msg '+(role==='user'?'me':'ai');
  div.textContent=text;
  const t=document.createElement('span');
  t.className='time';
  t.textContent=time||getTime();
  div.appendChild(t);
  d.appendChild(div);
  d.scrollTop=d.scrollHeight;
}

function resetSendBtn(){
  const btn=$('send-btn');
  btn.textContent='发送';
  btn.onclick=sendMsg;
  btn.disabled=false;
}
async function sendMsg(){
  if(pendingReply)return; // 已有请求正在处理，防止重复发送
  if(await window.api?.isAiBusy()){
    // AI 忙碌中→显示"正在输入"并改为中断按钮，不发送新消息
    const inp=$('chat-input');
    const btn=$('send-btn');
    const loadDiv=document.createElement('div');
    loadDiv.className='msg ai loading';
    loadDiv.innerHTML='正在输入<span>.</span><span>.</span><span>.</span>';
    $('msgs').appendChild(loadDiv);
    $('msgs').scrollTop=$('msgs').scrollHeight;
    btn.textContent='⏹';
    btn.onclick=cancelAi;
    btn.disabled=false;
    pendingReply={text:'',div:loadDiv,inp,btn};
    return;
  }
  if(!aiCfg.apiKey){addMsg('ai','请先在配置页面设置 API Key');return}
  const inp=$('chat-input');
  const btn=$('send-btn');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  btn.disabled=true;
  addMsg('user',txt);
  chatCfg.msgs.push({role:'user',content:txt,time:getTime()});
  // loading
  const loadDiv=document.createElement('div');
  loadDiv.className='msg ai loading';
  loadDiv.innerHTML='正在输入<span>.</span><span>.</span><span>.</span>';
  $('msgs').appendChild(loadDiv);
  $('msgs').scrollTop=$('msgs').scrollHeight;
  // 改为取消按钮，可中断AI返回
  btn.textContent='⏹';
  btn.onclick=cancelAi;
  btn.disabled=false;
  // 由宠物窗口调 AI，窗口关闭也不影响
  pendingReply={text:'',div:loadDiv,inp,btn};
  window.api?.sendToPetWindow({type:'user-msg',userText:txt});
}
function cancelAi(){
  if(!pendingReply)return;
  _cancelLatch=true;
  window.api?.sendToPetWindow({type:'cancel-ai'});
  // 立即清除 UI（回复即使已到达也被丢弃）
  if(pendingReply.div && pendingReply.div.parentNode){
    try{pendingReply.div.parentNode.removeChild(pendingReply.div)}catch(e){}
  }
  resetSendBtn();
  if(pendingReply.inp)pendingReply.inp.disabled=false;
  pendingReply=null;
}


function $(id){return document.getElementById(id)}

// 接收宠物窗口发送的消息
function _resolvePending(text){
  // 已中断—丢弃回复，仅恢复输入状态
  if(_cancelLatch){_cancelLatch=false;if(pendingReply?.inp)pendingReply.inp.disabled=false;resetSendBtn();pendingReply=null;return;}
  if(!pendingReply){addMsg('ai',text);return;} // 没有pending时直接追加
  pendingReply.div.textContent=text;
  const timeSpan=document.createElement('span');
  timeSpan.className='time';
  timeSpan.textContent=getTime();
  pendingReply.div.appendChild(timeSpan);
  pendingReply.div.classList.remove('loading');
  $('msgs').scrollTop=$('msgs').scrollHeight;
  if(pendingReply.inp)pendingReply.inp.disabled=false;
  resetSendBtn();
  pendingReply=null;
}
window.api?.onFromPetWindow(data=>{
  if(data.type==='tool-status'&&data.id&&data.id.startsWith('reads'))console.log('[chat] received readSt',JSON.stringify({id:data.id,readsLen:data.reads?.length,ok:data.ok,text:data.text}).slice(0,300));
  if(data.type==='chat-reply'||data.type==='show-reply'){
    _resolvePending(data.text);
  }
  if(data.type==='tool-status'){
    // 有 id 时复用已有行，否则创建新行
    let div=null;
    if(data.id){div=$('msgs').querySelector('[data-tid="'+data.id+'"]');}
    // 若该行已是汇总结果（读取/编辑），后续无汇总数据的状态（如"正在…"）不应覆盖它
    if(div && (div.classList.contains('ok')||div.classList.contains('err')) && !data.reads?.length && !data.edits?.length) return;
    if(!div){
      div=document.createElement('div');
      div.className='msg tool';
      if(data.id)div.setAttribute('data-tid',data.id);
      if(pendingReply&&pendingReply.div){
        $('msgs').insertBefore(div,pendingReply.div);
      }else{
        $('msgs').appendChild(div);
      }
    }
    // 读取汇总：带图标和状态，加载时转圈，完成后对号
    if(data.reads){
      div.className='msg tool'+(data.ok?' ok':data.err?' err':'');
      div.textContent='';
      const ico=document.createElement('span');
      ico.className='ts-ico'+(data.ok||data.err?'':' ts-spin');
      ico.textContent=data.ok?'✅':data.err?'❌':'';
      div.appendChild(ico);
      const txtSpan=document.createElement('span');
      let txt=data.text||'';
      data.reads.forEach(r=>{
        txt+='\n  📄 '+r.path+(r.lines?(' ('+r.lines+')'):'');
      });
      txtSpan.textContent=txt;
      div.appendChild(txtSpan);
      $('msgs').scrollTop=$('msgs').scrollHeight;
      return;
    }
    // 编辑/写入汇总：带图标和状态
    if(data.edits){
      div.className='msg tool'+(data.ok?' ok':data.err?' err':'');
      div.textContent='';
      const ico=document.createElement('span');
      ico.className='ts-ico'+(data.ok||data.err?'':' ts-spin');
      ico.textContent=data.ok?'✅':data.err?'❌':'';
      div.appendChild(ico);
      const txtSpan=document.createElement('span');
      let txt=data.text||'';
      data.edits.forEach(e=>{
        txt+='\n  📄 '+e.path+(e.note?(' — '+e.note):'');
      });
      txtSpan.textContent=txt;
      div.appendChild(txtSpan);
      $('msgs').scrollTop=$('msgs').scrollHeight;
      return;
    }
    // 更新内容和状态（用 textContent 而非 innerHTML，避免参数里的 < & " 破坏渲染）
    div.className='msg tool'+(data.ok?' ok':data.err?' err':'');
    div.textContent='';
    const ico=document.createElement('span');
    ico.className='ts-ico'+(data.ok||data.err?'':' ts-spin');
    ico.textContent=data.ok?'✅':data.err?'❌':'';
    const txtSpan=document.createElement('span');
    txtSpan.textContent=data.ok||data.err
      ? data.text.replace(/^[✓✗]\s*/,'')
      : data.text.replace(/\.\.\.$/,'');
    div.appendChild(ico);
    div.appendChild(txtSpan);
    $('msgs').scrollTop=$('msgs').scrollHeight;
  }
  if(data.type==='ai-thinking'){
    const div=document.createElement('div');
    div.className='msg thinking';
    const details=document.createElement('details');
    const summary=document.createElement('summary');
    summary.textContent='💭 ' + petName + '的思考过程（点击展开）';
    const body=document.createElement('div');
    body.className='think-body';
    body.textContent=data.text;
    details.appendChild(summary);
    details.appendChild(body);
    div.appendChild(details);
    // 有等待回复的 loading 气泡时，插到它前面，保持时间线顺序
    if(pendingReply&&pendingReply.div){
      $('msgs').insertBefore(div,pendingReply.div);
    }else{
      $('msgs').appendChild(div);
    }
    $('msgs').scrollTop=$('msgs').scrollHeight;
  }
  // ask_question 工具已移除

});

// 聊天窗口关闭时仅清理本地状态，不中断 AI 操作
window.addEventListener('beforeunload',()=>{pendingReply=null;});
window.api?.onAiCfgWindowClosed(async()=>{
  try{const r=await fetch('/load-ai-cfg');if(r.ok)aiCfg=await r.json()}catch(e){}
});
loadData();
</script>
</body>
</html>
