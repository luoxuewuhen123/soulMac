<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>茵茵技能</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#f5f5f7;display:flex;flex-direction:column;font:13px/1.5 'Microsoft YaHei','PingFang SC','Hiragino Sans GB',sans-serif}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(135deg,#ff9ec4,#ff6b9d);color:#fff;font-weight:bold;font-size:14px;flex-shrink:0;-webkit-app-region:drag}
#hdr .btn{display:inline-block;cursor:pointer;font-size:15px;opacity:.8;padding:0 6px;-webkit-app-region:no-drag}
#hdr .btn:hover{opacity:1}
#list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.skill{border-radius:12px;background:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.skill .icon{font-size:28px;flex-shrink:0}
.skill .info{flex:1;min-width:0}
.skill .info .name{font-size:14px;font-weight:bold;color:#333}
.skill .info .desc{font-size:12px;color:#999;margin-top:2px}
.skill .btn-add,.skill .btn-del{flex-shrink:0;border:none;border-radius:20px;padding:6px 16px;cursor:pointer;font-size:12px;transition:.2s}
.skill .btn-add{background:#ff6b9d;color:#fff}
.skill .btn-add:hover{background:#ff528a}
.skill .btn-del{background:#f0f0f0;color:#999}
.skill .btn-del:hover{background:#e0e0e0;color:#666}
.skill.installed .btn-add{display:none}
.skill.installed .btn-del{display:inline-block}
.skill:not(.installed) .btn-add{display:inline-block}
.skill:not(.installed) .btn-del{display:none}
.skill .btn-add.loading,.skill .btn-del.loading{opacity:.6;pointer-events:none;position:relative}
.skill .btn-add.loading::after,.skill .btn-del.loading::after{content:'⏳';margin-left:4px}
#empty{text-align:center;padding:40px 20px;color:#ccc;font-size:14px}
</style></head>
<body>
<div id="hdr"><span><span class="btn" onclick="window.api?.minimizeWindow()">─</span></span><span>🧩 技能管理</span><span><span class="btn" onclick="window.close()">✕</span></span></div>
<div id="list"></div>
<script>
// ===== 预设技能商店 =====
const SKILLS = [
  {id:'browser', icon:'🌐', name:'浏览器控制', desc:'让宠物可以打开网页、截图、点击按钮、填写表单。基于 Playwright MCP', cmd:'npx', args:['-y','@playwright/mcp','--headless']},
  {id:'docs', icon:'📚', name:'文档查询', desc:'宠物可以实时查询任意开源库的最新官方文档，避免 API 幻觉。基于 Context7', cmd:'npx', args:['-y','@upstash/context7-mcp']},
  {id:'github', icon:'🐙', name:'GitHub 管理', desc:'管理仓库、提 Issue、Review PR、查看代码。基于 GitHub MCP 官方', cmd:'npx', args:['-y','@modelcontextprotocol/server-github']},
  {id:'database', icon:'🗄️', name:'数据库查询', desc:'用自然语言查 MySQL、PostgreSQL、MongoDB 等数据库。基于 MindsDB', cmd:'npx', args:['-y','@mindsdb/mcp-server']},
  {id:'search', icon:'🔍', name:'深度搜索', desc:'增强的代码库语义搜索，能理解代码意图找到相关代码。基于 Serena', cmd:'npx', args:['-y','@oraios/serena-mcp']},
  {id:'figma', icon:'🎨', name:'Figma 设计稿', desc:'读取 Figma 设计稿信息，帮助生成对应代码。基于 Figma Context MCP', cmd:'npx', args:['-y','@glips/figma-context-mcp']},
  {id:'terminal', icon:'💻', name:'终端美化', desc:'在宠物内嵌终端面板，直接运行命令查看输出。基于 FastMCP', cmd:'npx', args:['-y','fastmcp-terminal']},
  {id:'schedule', icon:'📅', name:'定时任务', desc:'让宠物按计划自动执行任务，如每日问候、定期检查更新。基于 MCP Cron', cmd:'npx', args:['-y','@mcp/cron-server']},
  {id:'memory', icon:'🧠', name:'项目记忆', desc:'宠物能记住项目结构、技术栈和历史决策，重启不丢失上下文。基于 Memory Bank MCP', cmd:'npx', args:['-y','@modelcontextprotocol/server-memory'], env:{MEMORY_FILE_PATH:'data/memory.jsonl'}},
  {id:'translate', icon:'🌍', name:'多语言翻译', desc:'宠物可以翻译代码注释、文档、界面文案到任意语言。基于 MCP Translate', cmd:'npx', args:['-y','@mcp/translate-server']},
  {id:'email', icon:'📧', name:'邮件管理', desc:'宠物可以帮你收发邮件、管理收件箱、自动回复。基于 Email MCP', cmd:'npx', args:['-y','@mcp/email-server']},
  {id:'pdf', icon:'📄', name:'PDF 处理', desc:'宠物可以读取、合并、拆分、编辑 PDF 文件。基于 PDF MCP Server', cmd:'npx', args:['-y','@mcp/pdf-server']},
  {id:'weather', icon:'🌤️', name:'天气查询', desc:'查询实时天气、未来预报、空气质量等信息。基于 Weather MCP', cmd:'npx', args:['-y','@mcp/weather-server']},
  {id:'news', icon:'📰', name:'新闻聚合', desc:'获取最新新闻头条，按分类/关键词筛选。基于 News MCP', cmd:'npx', args:['-y','@mcp/news-server']},
  {id:'calculator', icon:'🧮', name:'科学计算', desc:'复杂数学计算、单位换算、公式求解。基于 Math MCP', cmd:'npx', args:['-y','@mcp/calculator-server']},
  {id:'image', icon:'🖼️', name:'图片处理', desc:'生成、编辑、转换图片格式，调整尺寸。基于 Image MCP', cmd:'npx', args:['-y','@mcp/image-server']},
  {id:'qr', icon:'📱', name:'二维码工具', desc:'生成二维码、识别图片中的二维码。基于 QR MCP', cmd:'npx', args:['-y','@mcp/qr-server']},
  {id:'json', icon:'📊', name:'JSON 工具', desc:'JSON 格式化、验证、转换、路径查询。基于 JSON MCP', cmd:'npx', args:['-y','@mcp/json-server']},
  {id:'color', icon:'🎨', name:'颜色工具', desc:'颜色格式转换、调色板生成、对比度检查。基于 Color MCP', cmd:'npx', args:['-y','@mcp/color-server']},
  {id:'uuid', icon:'🔢', name:'UUID 生成', desc:'生成各种格式的 UUID、随机 ID、哈希值。基于 UUID MCP', cmd:'npx', args:['-y','@mcp/uuid-server']},
  {id:'emoji', icon:'😊', name:'Emoji 搜索', desc:'搜索、翻译 Emoji，获取 Emoji 含义和用法。基于 Emoji MCP', cmd:'npx', args:['-y','@mcp/emoji-server']},
  {id:'crypto', icon:'🔐', name:'加密工具', desc:'文本加密解密、哈希计算、密钥生成。基于 Crypto MCP', cmd:'npx', args:['-y','@mcp/crypto-server']},
  {id:'time', icon:'🕐', name:'时间工具', desc:'时区转换、时间计算、倒计时、日历查询。基于 Time MCP', cmd:'npx', args:['-y','@mcp/time-server']},
];

let installed = {};

async function loadSkills() {
  try{const r=await fetch('/load-skills');if(r.ok)installed=await r.json();}catch(e){}
  render();
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  const inst = installed.installed || {};
  for (const s of SKILLS) {
    const isInstalled = !!inst[s.id];
    const div = document.createElement('div');
    div.className = 'skill' + (isInstalled ? ' installed' : '');
    // 图标
    const iconDiv = document.createElement('div');
    iconDiv.className = 'icon';
    iconDiv.textContent = s.icon;
    div.appendChild(iconDiv);
    // 信息
    const infoDiv = document.createElement('div');
    infoDiv.className = 'info';
    const nameDiv = document.createElement('div');
    nameDiv.className = 'name';
    nameDiv.textContent = s.name;
    infoDiv.appendChild(nameDiv);
    const descDiv = document.createElement('div');
    descDiv.className = 'desc';
    descDiv.textContent = s.desc;
    infoDiv.appendChild(descDiv);
    div.appendChild(infoDiv);
    // 添加按钮（用 data 属性标识技能 ID，避免 onclick 字符串注入风险）
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add';
    addBtn.textContent = '+ 添加';
    addBtn.dataset.skillId = s.id;
    addBtn.addEventListener('click', function(){addSkill(this.dataset.skillId);});
    div.appendChild(addBtn);
    // 卸载按钮
    const delBtn = document.createElement('button');
    delBtn.className = 'btn-del';
    delBtn.textContent = '✕ 卸载';
    delBtn.dataset.skillId = s.id;
    delBtn.addEventListener('click', function(){removeSkill(this.dataset.skillId);});
    div.appendChild(delBtn);
    list.appendChild(div);
  }
}

async function addSkill(id) {
  const s = SKILLS.find(x => x.id === id);
  if (!s) return;
  // 只给当前技能的按钮加 loading 状态
  const btn = document.querySelector(`.skill:not(.installed) .btn-add[data-skill-id="${id}"]`);
  if(btn)btn.classList.add('loading');
  const inst = installed.installed || {};
  inst[id] = { name: s.name, command: s.cmd, args: s.args, env: s.env };
  installed.installed = inst;
  try {
    await fetch('/save-skills', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(installed)});
    await fetch('/mcp-add-skill', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, cfg: inst[id]})});
  } catch(e) {
    // 增量添加失败时回退到全量重载
    try { await fetch('/mcp-reload', {method:'POST'}); } catch(e2) {}
  }
  render();
}

async function removeSkill(id) {
  // 只给当前技能的按钮加 loading 状态
  const btn = document.querySelector(`.skill.installed .btn-del[data-skill-id="${id}"]`);
  if(btn)btn.classList.add('loading');
  const inst = installed.installed || {};
  delete inst[id];
  installed.installed = inst;
  try {
    await fetch('/save-skills', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(installed)});
    await fetch('/mcp-remove-skill', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})});
  } catch(e) {
    try { await fetch('/mcp-reload', {method:'POST'}); } catch(e2) {}
  }
  render();
}

function $(id){return document.getElementById(id)}
loadSkills();
</script>
</body>
</html>
