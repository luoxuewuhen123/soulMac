<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>茵茵内置工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#f5f5f7;display:flex;flex-direction:column;font:13px/1.5 'Microsoft YaHei','PingFang SC','Hiragino Sans GB',sans-serif}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(135deg,#ff9ec4,#ff6b9d);color:#fff;font-weight:bold;font-size:14px;flex-shrink:0;-webkit-app-region:drag}
#hdr .btn{display:inline-block;cursor:pointer;font-size:15px;opacity:.8;padding:0 6px;-webkit-app-region:no-drag}
#hdr .btn:hover{opacity:1}
#intro{display:flex;align-items:center;gap:6px;cursor:pointer;padding:9px 12px;background:#fff7fb;color:#a05a7d;font-size:12px;border-bottom:1px solid #f0e3ea;-webkit-app-region:no-drag}
#intro .arrow{transition:transform .2s;display:inline-block;font-size:10px;color:#ff6b9d}
#intro.open .arrow{transform:rotate(90deg)}
#introDetail{max-height:0;overflow:hidden;background:#fff7fb;color:#a05a7d;font-size:12px;line-height:1.7;transition:max-height .25s ease;border-bottom:1px solid transparent}
#introDetail.open{padding:9px 12px;border-bottom:1px solid #f0e3ea}
#introDetail b{color:#ff6b9d}
#selectAll{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border-bottom:1px solid #eee;flex-shrink:0}
#selectAll .label{font-size:13px;color:#666;font-weight:bold}
#list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.tool{border-radius:12px;background:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tool .icon{font-size:26px;flex-shrink:0}
.tool .info{flex:1;min-width:0}
.tool .info .name{font-size:14px;font-weight:bold;color:#333}
.tool .info .desc{font-size:12px;color:#999;margin-top:2px}
.tool.off{opacity:.55}
/* 开关 */
.switch{position:relative;width:42px;height:24px;flex-shrink:0;cursor:pointer}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#e0e0e0;border-radius:24px;transition:.2s}
.slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .slider{background:#ff6b9d}
.switch input:checked + .slider:before{transform:translateX(18px)}
#footer{padding:8px 12px;font-size:11px;color:#bbb;text-align:center;border-top:1px solid #eee;flex-shrink:0}
</style></head>
<body>
<div id="hdr"><span><span class="btn" onclick="window.api?.minimizeWindow()">─</span></span><span>🧰 内置工具</span><span><span class="btn" onclick="window.close()">✕</span></span></div>
<div id="intro" onclick="toggleIntro()">
  <span class="arrow">▸</span>
  <span>🧰 内置工具是宠物自带的硬技能，默认全开，可逐个关闭以省 token 或限制能力（点击展开说明）</span>
</div>
<div id="introDetail">
  🧰 <b>内置工具</b>是宠物自带的「硬技能」，让它在本机直接干活：读写文件、生成/编辑 Word 文档、搜索代码、执行命令、抓取网页、识别图片、解析 PDF 等。它们<b>默认全部开启</b>，宠物和 AI 对话时会按需调用。如果你希望<b>更省 token</b>或<b>限制某些能力（如不想让它执行命令）</b>，可在这里关掉对应工具——关闭后，<b>下一次对话起</b>该工具就不会再发给 AI，无需重启。
</div>
<div id="selectAll"><span class="label">全选 / 取消全选</span><label class="switch" id="selectAllSwitch"><input type="checkbox" id="selectAllCb"/><span class="slider"></span></label></div>
<div id="list"></div>
<div id="footer">改动即时保存，下次对话生效 · 视觉类工具由模型是否支持视觉自动判断</div>
<script>
const TOOLS = [
  {name:'read_file', icon:'📖', label:'读取文件', desc:'读取文件：纯文本/代码（自动识别图片），支持 offset/lines 分段读取'},
  {name:'apply_patch', icon:'✏️', label:'编辑文件', desc:'用「查找→替换」精准修改文件中的一段文本，不碰其他内容'},
  {name:'write_file', icon:'📝', label:'写入文件', desc:'新建或整体覆盖纯文本/代码文件'},
  {name:'delete_file', icon:'🗑️', label:'删除文件', desc:'删除指定文件'},
  {name:'search', icon:'🔍', label:'搜索代码', desc:'搜索代码/文本中的关键词或正则，返回匹配行及上下文'},
  {name:'search_file', icon:'🔍', label:'搜索文件', desc:'按文件名模式搜索文件（支持通配符 * ?），如 *.html、*test*'},
  {name:'tree', icon:'🌳', label:'目录树', desc:'递归查看项目结构，可限制深度、忽略噪音目录'},
  {name:'bash', icon:'💻', label:'执行命令', desc:'在终端执行 shell 命令并取回输出（Windows 用 PowerShell）。能力最强，可按需关闭'},
  {name:'web_search', icon:'🔍', label:'搜索网页', desc:'搜索互联网，返回相关网页标题/链接/摘要，适合查文档、搜资料'},
  {name:'web_fetch', icon:'🌐', label:'抓取网页', desc:'抓取网页文字内容，适合查文档、搜资料'},
];

let disabled = new Set();

async function loadCfg(){
  try{const r=await fetch('/load-tools-cfg');if(r.ok){const j=await r.json();disabled=new Set(j.disabled||[]);}}catch(e){disabled=new Set();}
  render();
}

function updateSelectAllBtn(){
  const cb=document.getElementById('selectAllCb');
  if(!cb)return;
  const allOn=TOOLS.every(t=>!disabled.has(t.name));
  cb.checked=allOn;
}

function render(){
  const list=document.getElementById('list');
  list.innerHTML='';
  for(const t of TOOLS){
    const on=!disabled.has(t.name);
    const div=document.createElement('div');
    div.className='tool'+(on?'':' off');
    const icon=document.createElement('div');icon.className='icon';icon.textContent=t.icon;
    const info=document.createElement('div');info.className='info';
    const name=document.createElement('div');name.className='name';name.textContent=t.label;
    const desc=document.createElement('div');desc.className='desc';desc.textContent=t.desc;
    info.appendChild(name);info.appendChild(desc);
    const sw=document.createElement('label');sw.className='switch';
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=on;
    const slider=document.createElement('span');slider.className='slider';
    cb.addEventListener('change',()=>toggle(t.name,cb.checked,div));
    sw.appendChild(cb);sw.appendChild(slider);
    div.appendChild(icon);div.appendChild(info);div.appendChild(sw);
    list.appendChild(div);
  }
  updateSelectAllBtn();
}

async function toggle(name,on,div){
  if(on)disabled.delete(name);else disabled.add(name);
  try{
    await fetch('/save-tools-cfg',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({disabled:[...disabled]})});
    div.classList.toggle('off',!on);
    updateSelectAllBtn();
  }catch(e){
    // 保存失败回滚 UI
    if(on)disabled.add(name);else disabled.delete(name);
    div.querySelector('input').checked=!on;
    div.classList.toggle('off',on);
  }
}

async function toggleAll(){
  const cb=document.getElementById('selectAllCb');
  if(!cb)return;
  const someOff=TOOLS.some(t=>disabled.has(t.name));
  if(someOff){
    disabled.clear();
  }else{
    TOOLS.forEach(t=>disabled.add(t.name));
  }
  try{
    await fetch('/save-tools-cfg',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({disabled:[...disabled]})});
    render();
  }catch(e){
    render();
  }
}

document.getElementById('selectAllCb')?.addEventListener('change',toggleAll);

function toggleIntro(){const i=document.getElementById('intro'),d=document.getElementById('introDetail');if(d.classList.contains('open')){d.style.maxHeight='0px';i.classList.remove('open');d.classList.remove('open');}else{i.classList.add('open');d.classList.add('open');d.style.maxHeight=d.scrollHeight+'px';}}
loadCfg();
</script>
</body></html>
